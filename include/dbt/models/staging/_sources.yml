version: 2

sources:
  - name: raw
    database: meteo-ingest
    schema: weather_data
    tables:
      - name: abuja_hourly
        description: Raw hourly rows from Open-Meteo forecast ingest (streaming inserts).
        config:
          loaded_at_field: ingested_at
          freshness:
            warn_after: { count: 24, period: hour }
            error_after: { count: 72, period: hour }
